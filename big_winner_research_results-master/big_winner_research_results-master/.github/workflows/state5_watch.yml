name: Sniper OS State5 Watch Daily

on:
  schedule:
    # 毎日朝7:00に自動実行 (UTC 22:00)
    - cron: '0 22 * * *'
  workflow_dispatch: # 手動で即時実行するボタンも配置

permissions:
  contents: write

jobs:
  run-state5-watch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-node-version: '3.13'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install numpy pandas yfinance requests pyyaml

      - name: Run State5 Watch
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          NOTIFICATION_EMAIL: ${{ secrets.NOTIFICATION_EMAIL }}
          SPREADSHEET_WEBHOOK_URL: ${{ secrets.SPREADSHEET_WEBHOOK_URL }}
        run: |
          # 実行し、エラーが発生しても Actions を落とさずにログだけ残して安全終了
          python state5_monitoring_system.py || echo "Warning: Script failed, logged above."
