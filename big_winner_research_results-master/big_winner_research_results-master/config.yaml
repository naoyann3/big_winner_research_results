# Sniper OS Version 7 - Configuration File

# メール通知設定
email:
  gmail_user: "GMAIL_USER"
  gmail_pass: "GMAIL_APP_PASSWORD"
  notification_email: "NOTIFICATION_EMAIL"
  sender_name: "Sniper OS - State5 Watch"

# スクリーニングの基本閾値
thresholds:
  min_daily_turnover_million: 10.0      # 最低売買代金（1,000万円以上）
  vol_ratio_limit: 0.70                 # 出来高比率（20日平均比）
  bb_width_limit: 10.0                  # ボリンジャーバンド幅の最大上限 (%)
  rsi_min: 40.0                         # RSIの許容下限
  rsi_max: 60.0                         # RSIの許容上限
  ma75_dev_limit: 3.0                   # 75日線乖離の許容上限 (%)

# スコアイベントの配点ウェイト（合計100点）
scoring_weights:
  state5: 20            # 現在の状態が State 5 であること
  ma75_dev: 20          # 終値が 75日移動平均線 の±3%以内に近接していること
  vol_shrink: 20        # 出来高が 20日平均比 で 0.70倍以下に収縮（売り枯れ）していること
  bb_shrink: 15         # ボリンジャーバンド幅が 10%以下に収縮していること
  rsi: 10               # RSI（14）が 40〜60 の中立適正圏内にあること
  dist_to_52w_high: 10  # 52週高値から下落20%以内であること
  perfect_order: 5      # 上昇のパーフェクトオーダー（MA25 > MA75 > MA200）

# 運用設定
notification:
  priority_count: 5
  display_name: "Gold Watch"

# --- 【Version 7 新設：研究分析用の設定】 ---
research:
  history_file: "research_results/state5_history.csv"
  report_file: "research_results/champion_report.md"
  market_tickers: ["1306.T", "^N225"]  # 👈 これで確実にデータが降ってきます
