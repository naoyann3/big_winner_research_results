name: Daily Sniper Motion

on:
  schedule:
    # 毎日日本時間23:15（世界協定時 UTC 14:15）に自動実行
    # 混雑衝突を避けるため、Version1から15分ずらして起動します
    - cron: '15 14 * * *'
  workflow_dispatch: # 手動実行ボタンも有効化

jobs:
  run-motion-screener:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      # 既存の株価データベース（data_cache）を共有して利用します
      - name: Cache Stock Data
        uses: actions/cache@v3
        with:
          path: data_cache
          key: stock-data-${{ github.run_id }}
          restore-keys: |
            stock-data-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yfinance pandas numpy requests

      # 日次スクリーナー（dailyモード）の実行
      - name: Run Sniper Motion
        env:
          SPREADSHEET_WEBHOOK_URL: ${{ secrets.SPREADSHEET_WEBHOOK_URL }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          NOTIFICATION_EMAIL: ${{ secrets.NOTIFICATION_EMAIL }}
        run: |
          python sniper_motion_research.py --universe-csv universe.csv --mode daily